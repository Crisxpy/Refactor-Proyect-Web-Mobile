<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda Online Refactorizada</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f4f5f8;
      }
      header {
        background: #1d4ed8;
        color: white;
        padding: 1rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .container {
        max-width: 1200px;
        margin: 1.5rem auto;
        padding: 0 1rem;
      }
      .grid {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 1.25rem;
      }
      .card {
        background: white;
        border-radius: 0.75rem;
        box-shadow: 0 1px 10px rgba(15, 23, 42, 0.08);
        padding: 1rem;
      }
      .product-card {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 1rem;
        margin-bottom: 1rem;
        border-bottom: 1px solid #e5e7eb;
        padding-bottom: 1rem;
      }
      .product-card:last-child {
        border-bottom: none;
      }
      .badge-stock {
        position: absolute;
        top: 0.35rem;
        left: 0.35rem;
        font-size: 0.7rem;
        padding: 0.2rem 0.45rem;
        border-radius: 4px;
        font-weight: 600;
      }
      .badge-agotado {
        background: #dc2626;
        color: white;
      }
      .badge-poco {
        background: #f97316;
        color: white;
      }
      .reviews-block {
        margin-top: 0.5rem;
        font-size: 0.85rem;
        color: #475569;
      }
      .reviews-block ul {
        margin: 0.35rem 0 0;
        padding-left: 1.1rem;
      }
      .price {
        font-weight: 700;
        color: #0f172a;
      }
      .btn {
        border: none;
        border-radius: 0.5rem;
        padding: 0.6rem 1rem;
        cursor: pointer;
      }
      .btn-primary {
        background: #2563eb;
        color: white;
      }
      .btn-secondary {
        background: #e2e8f0;
        color: #1f2937;
      }
      .cart-item {
        display: flex;
        justify-content: space-between;
        padding: 0.75rem 0;
        border-bottom: 1px solid #e2e8f0;
      }
      .cart-item:last-child {
        border-bottom: none;
      }
      .hidden {
        display: none !important;
      }
      .header-group {
        display: flex;
        gap: 1rem;
        align-items: center;
      }
      input,
      select {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #cbd5e1;
        border-radius: 0.5rem;
      }
      .section-title {
        margin-top: 0;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Tienda Refactorizada</h1>
        <p>Login, catálogo, carrito y checkout en un frontend modular.</p>
      </div>
      <div class="header-group">
        <button id="btnShowLogin" class="btn btn-secondary">
          Iniciar sesión
        </button>
        <button id="btnShowCart" class="btn btn-primary">
          Carrito (<span id="cartCount">0</span>)
        </button>
      </div>
    </header>

    <div class="container">
      <div class="card">
        <div
          style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center"
        >
          <input
            id="searchQuery"
            type="text"
            placeholder="Buscar producto..."
          />
          <select id="searchCategory">
            <option value="">Todas las categorías</option>
            <option value="electronica">Electrónica</option>
            <option value="accesorios">Accesorios</option>
            <option value="audio">Audio</option>
            <option value="almacenamiento">Almacenamiento</option>
            <option value="componentes">Componentes</option>
            <option value="muebles">Muebles</option>
          </select>
          <button id="btnSearch" class="btn btn-primary">Buscar</button>
        </div>
      </div>

      <div class="grid">
        <section class="card" id="productListSection">
          <h2 class="section-title">Productos</h2>
          <div id="productList"></div>
        </section>
        <aside class="card" id="cartSection">
          <h2 class="section-title">Carrito</h2>
          <div id="cartList"></div>
          <div style="margin-top: 1rem; display: flex; gap: 0.5rem">
            <button id="btnCheckout" class="btn btn-primary">Checkout</button>
            <button id="btnClearCart" class="btn btn-secondary">
              Vaciar carrito
            </button>
          </div>
        </aside>
      </div>

      <div class="card hidden" id="loginSection">
        <h2 class="section-title">Iniciar sesión</h2>
        <div style="display: grid; gap: 0.75rem; max-width: 360px">
          <input
            id="loginEmail"
            type="email"
            placeholder="Correo electrónico"
          />
          <input id="loginPassword" type="password" placeholder="Contraseña" />
          <button id="btnLogin" class="btn btn-primary">Entrar</button>
          <div id="loginMessage"></div>
        </div>
      </div>

      <div class="card hidden" id="checkoutSection">
        <h2 class="section-title">Resumen de compra</h2>
        <div id="checkoutSummary"></div>
      </div>
    </div>

    <script type="module" src="./imager.js"></script>
  </body>
</html>
